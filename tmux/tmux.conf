# ~/.tmux.conf
# Tmux config for Claude Code CLI + nvim workflow
# Designed for: alacritty + zsh + nvim (lazy.nvim) + claude code cli

# ── Prefix ──────────────────────────────────────────────────────────────────
# Keep C-b but also add C-a as alternate (screen muscle memory)
set -g prefix C-b
bind C-a send-prefix

# ── Terminal ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"   # true color in alacritty
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /bin/zsh

# ── Feel ─────────────────────────────────────────────────────────────────────
set -g escape-time 10          # nvim wants this low
set -g focus-events on         # nvim autoread needs this
set -g mouse on
set -g history-limit 50000
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on     # keep window numbers tight after close

# ── Keybindings ──────────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Split panes — intuitive keys, stay in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation — mirrors your nvim C-hjkl splits
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize — mirrors your nvim ALT+arrow
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Zoom pane toggle (make it fill window, or restore)
bind z resize-pane -Z

# ── Claude Code layout ────────────────────────────────────────────────────────
# Bind to create a pre-configured Claude Code session layout:
#   Left pane (70%): nvim
#   Right pane (30%): claude / terminal
# Usage: prefix + G  (G for "go to Claude layout")
bind G run-shell '~/.config/tmux/scripts/claude-layout.sh'

# Quick pane: open claude in a new right-side split from wherever you are
# Usage: prefix + C  (C for Claude)
bind C split-window -h -p 35 -c "#{pane_current_path}" "claude"

# Send current file path to claude pane (companion to nvim yank-path workflow)
# Usage: prefix + P  (P for path)
bind P run-shell 'tmux send-keys -t {right} "@$(tmux display-message -p \"#{pane_current_path}\")" ""'

# ── Copy mode (vi) ────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"   # mac
bind -T copy-mode-vi r   send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────────────────────
# One dark colors to match your alacritty/nvim theme
COLOR_BG="#282c34"
COLOR_FG="#abb2bf"
COLOR_ACCENT="#61afef"   # blue
COLOR_GREEN="#98c379"
COLOR_YELLOW="#e5c07b"
COLOR_RED="#e06c75"
COLOR_GREY="#5c6370"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=${COLOR_BG},fg=${COLOR_FG}"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=${COLOR_ACCENT},bold] #S #[fg=${COLOR_GREY}]│ "

# Right: git branch + time
set -g status-right-length 60
set -g status-right "#[fg=${COLOR_GREY}]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/^/ /') #[fg=${COLOR_GREY}]│ #[fg=${COLOR_FG}]%H:%M "

# Window tabs
set -g window-status-format         "#[fg=${COLOR_GREY}] #I:#W "
set -g window-status-current-format "#[fg=${COLOR_ACCENT},bold] #I:#W #[fg=${COLOR_GREY}]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style        "fg=${COLOR_GREY}"
set -g pane-active-border-style "fg=${COLOR_ACCENT}"

# Message bar
set -g message-style "bg=${COLOR_BG},fg=${COLOR_YELLOW}"

# ── Session persistence (TPM plugins) ─────────────────────────────────────────
# Install TPM first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15m

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'       # restore nvim sessions too
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
